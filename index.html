<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lamp Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background:#1c1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;
    overflow:hidden;
}

/* Lamp */
.lamp-wrapper{
    position:relative;
    text-align:center;
}

.lamp{
    width:150px;
    height:170px;
    background:#ff8fab;
    border-radius:80px 80px 30px 30px;
    margin:auto;
    transition:0.5s;
}

.stand{
    width:12px;
    height:110px;
    background:#ccc;
    margin:auto;
}

.base{
    width:70px;
    height:18px;
    background:#aaa;
    border-radius:20px;
    margin:auto;
}

/* Rope */
.rope{
    width:4px;
    height:80px;
    background:white;
    position:absolute;
    top:-80px;
    left:50%;
    transform:translateX(-50%);
    cursor:pointer;
}

.rope::after{
    content:"";
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    position:absolute;
    bottom:-6px;
    left:-4px;
}

/* Glow */
.light-on{
    box-shadow:0 0 120px 50px rgba(255,210,150,0.8);
}

/* Login Card */
.login{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:#2b2d42;
    padding:40px;
    width:320px;
    border-radius:20px;
    text-align:center;
    opacity:0;
    transition:0.6s ease;
}

.login.active{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

.login h2{
    color:white;
    margin-bottom:20px;
}

.login input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#3a3d5c;
    color:white;
}

.login button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff4d6d;
    color:white;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="lamp-wrapper">

    <div class="rope" onclick="toggleLamp()"></div>

    <div class="lamp" id="lamp"></div>
    <div class="stand"></div>
    <div class="base"></div>

</div>

<div class="login" id="loginBox">
    <h2>Welcome Back</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

<script>
let on=false;

function toggleLamp(){
    const lamp=document.getElementById("lamp");
    const login=document.getElementById("loginBox");

    on=!on;

    if(on){
        lamp.classList.add("light-on");
        login.classList.add("active");
    }else{
        lamp.classList.remove("light-on");
        login.classList.remove("active");
    }
}
</script>

</body>
</html>
